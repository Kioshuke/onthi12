<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÔN TẬP HỌC KÌ 2 - LỚP 12</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#1a73e8;
color:white;
text-align:center;
padding:30px 10px;
}

.header h1{
margin:0;
font-size:32px;
}

.header p{
margin:5px 0 0 0;
opacity:0.9;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.menu button{
padding:15px 30px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
}

.menu button:hover{
background:#e8f0fe;
}

/* CONTENT */

.content{
max-width:1000px;
margin:auto;
padding:30px 20px;
}

/* CARD */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
margin-top:0;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#1a73e8;
color:white;
text-decoration:none;
border-radius:5px;
}

.btn:hover{
background:#0f5bd4;
}

iframe{
width:100%;
height:90vh;
border:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
<h1>ÔN TẬP HỌC KÌ 2 - LỚP 12</h1>
<p>THPT Tân Hồng</p>
</div>

<div class="menu">
<button onclick="show('gk1')">Giữa kì 1</button>
<button onclick="show('gk2')">Giữa kì 2</button>
<button onclick="show('ck')">Cuối kì</button>
</div>

<div class="content">

<div id="gk1">

<div class="grid">

<div class="card">
<h3>Đề 1</h3>
<p>Bài ôn tập trắc nghiệm.</p>
<a class="btn" onclick="loadQuiz('LINK_QUIZ_1')">Làm bài</a>
</div>

<div class="card">
<h3>Đề 2</h3>
<p>Bài ôn tập trắc nghiệm.</p>
<a class="btn" onclick="loadQuiz('LINK_QUIZ_2')">Làm bài</a>
</div>

</div>

</div>

<div id="gk2" style="display:none">
<h2>Đang cập nhật</h2>
</div>

<div id="ck" style="display:none">
<h2>Đang cập nhật</h2>
</div>

<div id="quiz"></div>

</div>

<script>

function show(id){

document.getElementById("gk1").style.display="none";
document.getElementById("gk2").style.display="none";
document.getElementById("ck").style.display="none";

document.getElementById(id).style.display="block";

}

function loadQuiz(link){

document.getElementById("quiz").innerHTML =
`<iframe src="${link}"></iframe>`;

window.scrollTo({
top:document.getElementById("quiz").offsetTop,
behavior:"smooth"
});

}

</script>

</body>
</html>
