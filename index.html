<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website đang bảo trì</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#0f172a;
overflow:hidden;
}

/* nền gradient nhẹ */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: linear-gradient(135deg,#1a73e8,#6a5cff,#0f172a);
background-size:300% 300%;
animation:bgMove 10s ease infinite;
z-index:-1;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* container */
.maintenance{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

/* ảnh */
.maintenance img{
max-width:320px;
width:90%;
margin-bottom:20px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation: float 3s ease-in-out infinite;
}

/* hiệu ứng nổi nhẹ */
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* tiêu đề */
h1{
font-size:28px;
margin:10px 0;
}

/* mô tả */
p{
opacity:0.85;
margin-bottom:20px;
}

/* loading */
.loader{
margin-top:10px;
width:50px;
height:50px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* thời gian quay lại */
.time{
margin-top:15px;
font-size:14px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="maintenance">

<img src="Website đang được bảo trì.png" alt="Maintenance">

<h1>🚧 Website đang bảo trì</h1>

<p>Hệ thống đang được nâng cấp để mang lại trải nghiệm tốt hơn.<br>
Vui lòng quay lại sau nhé!</p>

<div class="loader"></div>

<div class="time" id="timeText">
⏳ Dự kiến hoạt động lại sau: ...
</div>

</div>

<script>
// fake giờ mở lại (tuỳ chỉnh)
const reopenTime = new Date();
reopenTime.setHours(reopenTime.getHours() + 24);

function updateTime(){
const now = new Date();
const diff = reopenTime - now;

if(diff <= 0){
document.getElementById("timeText").innerText = "✅ Website đã sẵn sàng!";
return;
}

const h = Math.floor(diff / (1000*60*60));
const m = Math.floor((diff % (1000*60*60)) / (1000*60));

document.getElementById("timeText").innerText =
`⏳ Dự kiến hoạt động lại sau: ${h}h ${m}p`;
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
