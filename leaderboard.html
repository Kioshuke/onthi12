<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Hỏi Bài</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  margin:0;
}

.forum-box{
  max-width:600px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:15px;
}

.input-area{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:15px;
}

.input-area input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.input-area button{
  padding:10px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.input-area button:hover{
  background:#1d4ed8;
}

#forum{
  max-height:400px;
  overflow-y:auto;
}

.message{
  background:#f8fafc;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  animation: fadeIn 0.3s ease;
}

.name{
  font-weight:bold;
  color:#2563eb;
}

.time{
  font-size:12px;
  color:#888;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="forum-box">
  <h2>💬 Hỏi bài nhanh</h2>

  <div class="input-area">
    <input id="name" placeholder="Tên của bạn (hoặc để ẩn danh)">
    <input id="message" placeholder="Nhập câu hỏi...">
    <button onclick="sendMessage()">Gửi</button>
  </div>

  <div id="forum"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 DÁN CONFIG FIREBASE CỦA M VÀO ĐÂY
const firebaseConfig = {
  apiKey: "AIzaSyCOelxKPrcSeiLpYN2WwYPWysHwZjZLd9c",
  authDomain: "onthi12-thpttanhong.firebaseapp.com",
  databaseURL: "https://onthi12-thpttanhong-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "onthi12-thpttanhong"
};
const auth = getAuth(app);
let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;

    // auto điền tên
    document.getElementById("name").value = user.displayName || "User";
  }
});
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastSend = 0;

// 👉 gửi tin
window.sendMessage = function(){
  let now = Date.now();
  if(now - lastSend < 3000){
    alert("Chờ 3s 😅");
    return;
  }
  lastSend = now;

  let name = "Ẩn danh";

    if(currentUser){
    name = currentUser.displayName || currentUser.email;
    }
  let msg = document.getElementById("message").value;

  if(msg.trim() === "") return;

    push(ref(db, "forum"), {
    name: name,
    message: msg,
    time: Date.now(),
    uid: currentUser ? currentUser.uid : null,
    avatar: currentUser ? currentUser.photoURL : null
    });

  document.getElementById("message").value = "";
}

// 👉 hiển thị realtime
onValue(ref(db, "forum"), (snapshot)=>{
  let data = snapshot.val();
  let html = "";

  for(let id in data){
    let item = data[id];

    html += `
      <div class="message">
        <div class="name">${item.name}</div>
        <div>${item.message}</div>
        <div class="time">${new Date(item.time).toLocaleString()}</div>
      </div>
    `;
  }

  document.getElementById("forum").innerHTML = html;

  // auto scroll xuống cuối
  document.getElementById("forum").scrollTop = 999999;
});
</script>

</body>
</html>
