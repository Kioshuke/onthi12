<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Luyện thi</title>
    <style>
        :root {
            --primary: #2563eb; /* Xanh dương đậm */
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #10b981;
            --info: #3b82f6; /* Xanh dương cho review */
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); padding: 12px 20px; border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 25px;
            position: sticky; top: 15px; z-index: 100; border: 1px solid #e2e8f0;
        }

        .logo-area h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        
        .question-card {
            background: var(--card); padding: 28px; border-radius: 20px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); margin-bottom: 20px;
            border: 2px solid transparent; transition: all 0.3s ease;
        }

        .q-header { display: block; gap: 12px; margin-bottom: 20px; font-weight: 600; font-size: 1.05rem; align-items: flex-start; line-height: 1.6; }
        .q-badge { 
            display: inline-block; /* Quan trọng để chữ có thể chảy bao quanh nó */
            background: var(--primary-light); 
            color: var(--primary); 
            padding: 2px 10px; 
            border-radius: 8px; 
            font-size: 0.8rem;
            margin-right: 8px; /* Khoảng cách với chữ đầu tiên của câu hỏi */
            vertical-align: middle; /* Căn chỉnh cho đẹp với dòng chữ đầu */
        }
        /* Tìm đoạn này và sửa lại display thành none */
        .mobile-nav-btn {
            display: none; /* Ẩn trên máy tính */
            position: fixed;
            bottom: 20px;
            right: 20px;
            /* ... các code cũ giữ nguyên ... */
        }
        /* Layout chính để chia cột */
        .main-layout { display: flex; gap: 25px; align-items: flex-start; width: 100%; }
        .quiz-section { flex: 2; }

        /* Thanh mục lục bên phải */
        .sidebar {
            width: 280px; 
            min-width: 300px; /* Đảm bảo mục lục không bị quá nhỏ */
            max-width: 400px; /* Đảm bảo mục lục không bị quá to */
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
            position: sticky; 
            top: 85px;
            border: 1px solid #e2e8f0;
        }
        .sidebar-header { font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .nav-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .nav-item {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: 0.2s; background: white;
        }
        .nav-item.done { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .nav-item:hover { border-color: var(--primary); }

        @media (max-width: 1024px) {
        .mobile-nav-btn { 
        display: flex !important; /* Ép buộc hiện nút */
        position: fixed !important; /* Luôn nổi trên màn hình */
        bottom: 30px; /* Cách đáy 30px */
        right: 20px;  /* Cách phải 20px */
        width: 50px; 
        height: 50px; 
        background: var(--primary); 
        color: white; 
        border-radius: 50%; 
        border: none;
        align-items: center; 
        justify-content: center; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 9999; /* Cho lên trên cùng để không bị che mất */
        font-size: 20px;
        cursor: pointer;
        }
        /* Giảm khoảng cách bao quanh toàn bộ trang */
        body { 
            padding: 10px 5px; /* Giảm padding trái/phải xuống còn 5px */
        }

        .container { 
            padding: 0; /* Bỏ padding của container */
        }

        /* Làm cho các thẻ câu hỏi tràn sát lề hơn */
        .question-card {
            padding: 15px; /* Giảm padding bên trong card câu hỏi */
            margin-bottom: 12px; /* Giảm khoảng cách giữa các câu */
            border-radius: 12px; /* Bo góc nhẹ lại cho hợp với màn hình nhỏ */
        }

        /* Chỉnh lại lưới đáp án trên điện thoại */
        .answers-grid {
            grid-template-columns: 1fr; /* Luôn để 1 cột trên điện thoại để chữ không bị nén */
            gap: 8px;
        }

        /* Header của trang */
        header {
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        /* Mục lục khi mở trên điện thoại */
        .sidebar { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 2100; 
            width: 90%; /* Rộng hơn một chút để dễ bấm */
            max-height: 80vh; 
            overflow-y: auto; 
        }

        .main-layout { display: block; }
    }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ans-label { 
            border: 2px solid #e2e8f0; padding: 14px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; transition: all 0.2s;
            position: relative; overflow: hidden; align-items: center;
        }
        .ans-label:hover:not(.disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .ans-label.selected { border-color: var(--primary); background: var(--primary-light); }
        
        /* Trạng thái Review - Đổi sang Xanh dương theo yêu cầu */
        .review-correct { border: 2px solid var(--success) !important; background: transparent !important; }
        .review-wrong { border: 2px solid var(--danger) !important; background: transparent !important; }
        .ans-label.review-wrong { background: #fef2f2 !important; }
        .true-answer-highlight { border: 2px solid var(--info) !important; background: var(--primary-light) !important; }
        .true-answer-highlight::after { content: "✓ Đáp án đúng"; position: absolute; right: 8px; top: 2px; font-size: 0.65rem; color: var(--info); font-weight: bold; }

        .btn { padding: 10px 22px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-reload { background: var(--info); color: white; } /* Nút làm lại màu xanh dương */

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); display: none; 
            justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(6px);
        }
        .modal-content {
            background: white; padding: 35px; border-radius: 28px;
            width: 90%; max-width: 400px; text-align: center;
        }

        .score-circle {
            width: 120px; height: 120px; background: #eff6ff; color: var(--primary);
            font-size: 50px; font-weight: 900; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            border: 4px solid #dbeafe;
        }
        /* Màu cho ô mục lục khi xem kết quả */
        .nav-item.nav-correct { background: #ecfdf5 !important; border-color: var(--success) !important; color: var(--success) !important; }
        .nav-item.nav-wrong { background: #fef2f2 !important; border-color: var(--danger) !important; color: var(--danger) !important; }

        @media (max-width: 600px) { .answers-grid { grid-template-columns: 1fr; } }
        .short-input:focus {
            outline: none;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        /* Grid riêng cho đúng sai (chia 2 cột) */
        .tf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Chia 2 cột đều nhau */
            gap: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area"><h2>LearnHub Test</h2></div>
        <div id="action-button-container">
            <button class="btn btn-primary" onclick="openModal('confirmModal')"><span>📤</span> Nộp bài</button>
        </div>
    </header>
    <div class="main-layout">
    <div class="quiz-section" id="quiz-container">Đang tải câu hỏi...</div>
    
    <aside class="sidebar" id="sidebarNav">
        <div class="sidebar-header">
            <span>MỤC LỤC</span>
            <span id="progressText" style="color:var(--primary); font-size: 0.9rem;">0/0</span>
        </div>
        <div class="nav-grid" id="navGrid"></div>
    </aside>
</div>

<button class="mobile-nav-btn" onclick="toggleSidebar()">📋</button>
<div id="sidebarOverlay" class="modal-overlay" onclick="toggleSidebar()" style="z-index: 2050;"></div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Xác nhận nộp bài?</h3>
        <p>Bạn có chắc chắn muốn kết thúc bài thi này?</p>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn" style="flex:1; background:#f1f5f9;" onclick="closeModal('confirmModal')">Quay lại</button>
            <button class="btn btn-primary" style="flex:1" onclick="handleFinalSubmit()">Nộp ngay</button>
        </div>
    </div>
</div>

<div id="resultModal" class="modal-overlay">
    <div class="modal-content">
        <div class="score-circle" id="scoreValue">0</div>
        <h3>Kết quả</h3>
        <p id="statsText">Đúng 0/0 câu</p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
            <button class="btn btn-primary" style="justify-content: center;" onclick="reviewMode()">👁️ Xem bài làm</button>
            <button class="btn" style="justify-content: center; background: #f1f5f9" onclick="location.reload()">🔄 Làm lại</button>
        </div>
    </div>
</div>

<script>
    const JSON_URL = "questions.json";
    let questionsData = [];

    // 1. Hàm xáo trộn mảng (Dùng để trộn câu hỏi và đáp án)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 2. Tải câu hỏi từ file JSON với cơ chế Anti-cache (luôn load mới)
    async function loadQuestions() {
        try {
            // Thêm timestamp để trình duyệt không load bản cũ trong bộ nhớ đệm
            const timestamp = new Date().getTime();
            const res = await fetch(`${JSON_URL}?v=${timestamp}`);
            
            if (!res.ok) throw new Error("Lỗi tải file JSON");
            const data = await res.json();

            // 3. Logic Xáo trộn: Trộn thứ tự câu hỏi và trộn cả thứ tự đáp án bên trong
            questionsData = shuffle(data).map(q => {
                // Tạo mảng đối tượng đáp án để giữ nguyên vết đáp án đúng sau khi trộn
                const mixedAnswers = q.answers.map((ans, index) => ({
                    text: ans,
                    isCorrect: index === q.correct
                }));
                
                shuffle(mixedAnswers); // Xáo trộn đáp án

                return {
                    question: q.question,
                    answers: mixedAnswers.map(a => a.text),
                    // Tìm lại vị trí mới của đáp án đúng sau khi đã trộn
                    correct: mixedAnswers.findIndex(a => a.isCorrect)
                };
            });

            renderQuiz();
            renderNav();
        } catch (e) {
            document.getElementById('quiz-container').innerText = "Không thể tải dữ liệu: " + e.message;
        }
    }
    let totalMaxScore = 0; // Biến lưu tổng điểm tối đa
    function renderQuiz() {
    const quizContainer = document.getElementById('quiz-container'); // Hoặc id tương ứng của bạn
    const navContainer = document.querySelector('.nav-grid');
    
    let quizHtml = '';
    let navHtml = '';
    let globalIdx = 0;
    
    // Reset tổng điểm tối đa khi render
    window.totalMaxScore = 0;

    questionsData.forEach((section) => {
        // --- PHẦN BÀI LÀM ---
        quizHtml += `<h2 class="section-header" style="margin: 40px 0 20px; padding: 12px; background: var(--primary-light); color: var(--primary); border-radius: 8px; font-size: 1.2rem; border-left: 5px solid var(--primary);">${section.sectionTitle}</h2>`;
        
        // --- PHẦN MỤC LỤC ---
        navHtml += `<div class="nav-section-label" style="grid-column: 1/-1; font-weight: bold; margin: 15px 0 5px; font-size: 0.75rem; color: #64748b; text-transform: uppercase;">${section.sectionTitle}</div>`;

        section.questions.forEach((item) => {
            // Xử lý ảnh: Bất kể loại câu hỏi nào, nếu có trường image thì đều hiện
            const imageHtml = item.image ? `
                <div class="q-image" style="text-align: center; margin: 15px 0;">
                    <img src="${item.image}" alt="Hình ảnh câu ${globalIdx + 1}" style="max-width: 100%; max-height: 350px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                </div>
            ` : '';

            let answersContent = '';

            if (item.type === 'multiple') {
                window.totalMaxScore += 1;
                answersContent = `
                    <div class="answers-grid">
                        ${item.answers.map((ans, idx) => `
                            <label class="ans-label" id="label-${globalIdx}-${idx}" onclick="selectAnswer(this, ${globalIdx})">
                                <input type="radio" name="question-${globalIdx}" value="${idx}">
                                <span>${ans}</span>
                            </label>
                        `).join('')}
                    </div>`;
            } 
            else if (item.type === 'true_false') {
                window.totalMaxScore += 1; // 4 ý x 0.25
                answersContent = `
                    <div class="tf-wrapper" style="background: #f8fafc; border-radius: 12px; padding: 10px; border: 1px solid #e2e8f0;">
                        ${item.subQuestions.map((sub, subIdx) => `
                            <div class="tf-row" style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #edf2f7; gap: 10px;">
                                <div style="flex: 1; font-size: 14px;"><strong>${String.fromCharCode(97 + subIdx)}.</strong> ${sub}</div>
                                <div style="display: flex; gap: 10px;">
                                    <label style="background: white; padding: 5px 10px; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                                        <input type="radio" name="tf-${globalIdx}-${subIdx}" value="0" onclick="checkTFDone(${globalIdx})"> Đ
                                    </label>
                                    <label style="background: white; padding: 5px 10px; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                                        <input type="radio" name="tf-${globalIdx}-${subIdx}" value="1" onclick="checkTFDone(${globalIdx})"> S
                                    </label>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            } 
            else if (item.type === 'short_answer') {
                window.totalMaxScore += 1;
                answersContent = `
                    <div class="short-answer-box" style="margin-top: 15px;">
                        <input type="text" class="short-input" placeholder="Nhập đáp án..." 
                               oninput="markDone(${globalIdx})" data-qidx="${globalIdx}"
                               style="width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s;">
                    </div>`;
            }

            quizHtml += `
                <div class="question-card" id="card-${globalIdx}" style="margin-bottom: 30px;">
                    <div class="q-header" style="font-weight: 600; font-size: 1.1rem; line-height: 1.5;">
                        <span class="q-badge" style="background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; margin-right: 8px;">Câu ${globalIdx + 1}</span>
                        ${item.question}
                    </div>
                    ${imageHtml}
                    <div class="q-body">${answersContent}</div>
                </div>
            `;
            
            navHtml += `<div class="nav-item" id="nav-${globalIdx}" onclick="scrollToQuestion(${globalIdx})">${globalIdx + 1}</div>`;
            globalIdx++;
        });
    });

    quizContainer.innerHTML = quizHtml;
    navContainer.innerHTML = navHtml;
    updateProgress(false); // Cập nhật trạng thái ban đầu (0/Tổng số câu)
}

// Hàm bổ trợ: Kiểm tra xem đã tích đủ 4 ý câu Đúng/Sai chưa
function checkTFDone(globalIdx) {
    const checked = document.querySelectorAll(`input[name^="tf-${globalIdx}-"]:checked`);
    if (checked.length === 4) {
        markDone(globalIdx);
    }
}
    function handleFinalSubmit() {
    let userScore = 0;
    let globalIdx = 0;

    questionsData.forEach((section) => {
        section.questions.forEach((item) => {
            if (item.type === 'multiple') {
                const selected = document.querySelector(`input[name="question-${globalIdx}"]:checked`);
                if (selected && parseInt(selected.value) === item.correct) userScore += 1;
            } 
            else if (item.type === 'true_false') {
                item.subQuestions.forEach((_, subIdx) => {
                    const selected = document.querySelector(`input[name="tf-${globalIdx}-${subIdx}"]:checked`);
                    if (selected && parseInt(selected.value) === item.correctAnswers[subIdx]) {
                        userScore += 0.25;
                    }
                });
            }
            else if (item.type === 'short_answer') {
                const input = document.querySelector(`input[data-qidx="${globalIdx}"]`).value.trim().toLowerCase();
                if (input === item.correctAnswer.toLowerCase()) userScore += 1;
            }
            globalIdx++;
        });
    });

    // Hiển thị kết quả
    window.finalScore = userScore;
    document.getElementById('statsText').innerText = `Điểm của bạn: ${userScore.toFixed(2)} / ${totalMaxScore}`;
    openModal('resultModal');
}
    function selectAnswer(el, qIdx) {
        if(el.classList.contains('disabled')) return;
        document.querySelectorAll(`input[name="question-${qIdx}"]`).forEach(input => input.parentElement.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(`nav-${qIdx}`).classList.add('done');
        updateProgress();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function handleFinalSubmit() {
    let userScore = 0;
    let globalIdx = 0;

    questionsData.forEach((section) => {
        section.questions.forEach((item) => {
            const navItem = document.getElementById(`nav-${globalIdx}`);
            let isPerfect = true; // Giả sử câu này đúng hoàn toàn

            if (item.type === 'multiple') {
                const selected = document.querySelector(`input[name="question-${globalIdx}"]:checked`);
                if (selected && parseInt(selected.value) === item.correct) {
                    userScore += 1;
                } else {
                    isPerfect = false;
                }
            } 
            else if (item.type === 'true_false') {
                let correctSubCount = 0;
                item.subQuestions.forEach((_, subIdx) => {
                    const selected = document.querySelector(`input[name="tf-${globalIdx}-${subIdx}"]:checked`);
                    if (selected && parseInt(selected.value) === item.correctAnswers[subIdx]) {
                        userScore += 0.25;
                        correctSubCount++;
                    }
                });
                // Nếu không đúng đủ 4 ý thì coi như câu này sai (màu đỏ)
                if (correctSubCount < 4) isPerfect = false;
            }
            else if (item.type === 'short_answer') {
                const input = document.querySelector(`input[data-qidx="${globalIdx}"]`).value.trim().toLowerCase();
                if (input === item.correctAnswer.toLowerCase()) {
                    userScore += 1;
                } else {
                    isPerfect = false;
                }
            }

            // TÔ MÀU MỤC LỤC:
            navItem.classList.remove('done'); // Bỏ màu xanh làm bài
            if (isPerfect) {
                navItem.style.background = "var(--success)"; // Xanh lá nếu đúng hết
                navItem.style.color = "white";
            } else {
                navItem.style.background = "var(--danger)"; // Đỏ nếu có bất kỳ ý nào sai
                navItem.style.color = "white";
            }

            globalIdx++;
        });
    });

    // Hiển thị tổng điểm
    window.finalScore = userScore;
    document.getElementById('statsText').innerText = `Kết quả: ${userScore.toFixed(2)} / ${totalMaxScore} điểm`;
    openModal('resultModal');
}
  function checkTFDone(globalIdx) {
    // Kiểm tra xem đã chọn đủ 4 radio của câu đó chưa
    const checkedRadios = document.querySelectorAll(`input[name^="tf-${globalIdx}-"]:checked`);
    if (checkedRadios.length === 4) {
        markDone(globalIdx); // Hiện màu xanh báo hiệu đã làm xong câu này
    }
}
    // Hàm xác nhận trước khi làm lại
    function confirmReload() {
        const isConfirm = confirm("Bạn có chắc chắn muốn làm lại từ đầu không? Toàn bộ kết quả hiện tại sẽ bị xóa.");
        if (isConfirm) {
            location.reload();
        }
    }
    function reviewMode() {
        closeModal('resultModal');
        updateProgress(true, window.finalCorrectCount);
        document.getElementById('action-button-container').innerHTML = `
            <button class="btn btn-reload" onclick="confirmReload()"><span>🔄</span> Làm lại</button>
        `;
      // Chặn reload và đóng tab khi đang làm bài
      window.addEventListener('beforeunload', function (e) {
          // Kiểm tra xem có đang trong chế độ Review (đã nộp bài) hay không
          // Nếu nút "Làm lại" chưa xuất hiện, tức là đang làm bài
          const isReviewMode = document.querySelector('.btn-reload') !== null;

          if (!isReviewMode) {
              // Hầu hết trình duyệt hiện đại yêu cầu thiết lập các giá trị này để hiện thông báo
              e.preventDefault(); 
              e.returnValue = 'Bạn có chắc muốn rời đi? Bài làm của bạn sẽ không được lưu.';
              return 'Bạn có chắc muốn rời đi?';
          }
      });
      questionsData.forEach((item, i) => {
          const card = document.getElementById(`card-${i}`);
          const navItem = document.getElementById(`nav-${i}`); // Lấy ô số tương ứng
          const selectedInput = document.querySelector(`input[name="question-${i}"]:checked`);
          const correctIdx = item.correct;

          document.getElementById(`label-${i}-${correctIdx}`).classList.add('true-answer-highlight');

          if (selectedInput) {
              const userVal = parseInt(selectedInput.value);
              if (userVal === correctIdx) {
                  card.classList.add('review-correct');
                  navItem.classList.add('nav-correct'); // <-- THÊM: Ô số mục lục biến thành Xanh lá
              } else {
                  card.classList.add('review-wrong');
                  document.getElementById(`label-${i}-${userVal}`).classList.add('review-wrong');
                  navItem.classList.add('nav-wrong');   // <-- THÊM: Ô số mục lục biến thành Đỏ
              }
          } else {
              card.classList.add('review-wrong');
              navItem.classList.add('nav-wrong');       // <-- THÊM: Không làm cũng thành Đỏ
          }
      });

        document.querySelectorAll('.ans-label').forEach(l => l.classList.add('disabled'));
        document.querySelectorAll('input').forEach(i => i.disabled = true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuestions();
    function renderNav() {
        const navGrid = document.getElementById('navGrid');
        navGrid.innerHTML = questionsData.map((_, i) => `
            <div class="nav-item" id="nav-${i}" onclick="scrollToQuestion(${i})">${i + 1}</div>
        `).join('');
        updateProgress();
    }

    function scrollToQuestion(i) {
        const el = document.getElementById(`card-${i}`);
        const offset = 100; 
        window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
        if(window.innerWidth <= 1024) toggleSidebar(); 
    }

    function updateProgress(isFinished, correctCount = 0) {
        const textEl = document.getElementById('progressText');
        if (isFinished) {
            // Khi đã nộp bài: Hiện số câu đúng và đổi chữ sang màu Xanh lá
            textEl.innerText = `${correctCount}/${questionsData.length}`;
            textEl.style.color = "var(--success)"; 
        } else {
            // Khi đang làm: Hiện số câu đã chọn và chữ màu Xanh dương
            const doneCount = document.querySelectorAll('.nav-item.done').length;
            textEl.innerText = `${doneCount}/${questionsData.length}`;
            textEl.style.color = "var(--primary)";
        }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebarNav');
        const overlay = document.getElementById('sidebarOverlay');
        const isVisible = (sidebar.style.display === 'block');
        
        sidebar.style.display = isVisible ? '' : 'block';
        overlay.style.display = isVisible ? 'none' : 'flex';
    }
</script>
</body>
</html>
