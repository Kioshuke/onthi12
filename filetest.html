<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Luyện thi Pro</title>
    <style>
        :root {
            --primary: #2563eb; /* Xanh dương đậm */
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #10b981;
            --info: #3b82f6; /* Xanh dương cho review */
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); padding: 12px 20px; border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 25px;
            position: sticky; top: 15px; z-index: 100; border: 1px solid #e2e8f0;
        }

        .logo-area h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        
        .question-card {
            background: var(--card); padding: 28px; border-radius: 20px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); margin-bottom: 20px;
            border: 2px solid transparent; transition: all 0.3s ease;
        }

        .q-header { display: block; gap: 12px; margin-bottom: 20px; font-weight: 600; font-size: 1.05rem; align-items: flex-start; line-height: 1.6; }
        .q-badge { 
            display: inline-block; /* Quan trọng để chữ có thể chảy bao quanh nó */
            background: var(--primary-light); 
            color: var(--primary); 
            padding: 2px 10px; 
            border-radius: 8px; 
            font-size: 0.8rem;
            margin-right: 8px; /* Khoảng cách với chữ đầu tiên của câu hỏi */
            vertical-align: middle; /* Căn chỉnh cho đẹp với dòng chữ đầu */
        }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ans-label { 
            border: 2px solid #e2e8f0; padding: 14px; border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; transition: all 0.2s;
            position: relative; overflow: hidden; min-height: 54px; align-items: center;
        }
        .ans-label:hover:not(.disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .ans-label.selected { border-color: var(--primary); background: var(--primary-light); }
        
        /* Trạng thái Review - Đổi sang Xanh dương theo yêu cầu */
        .review-correct { border: 2px solid var(--success) !important; background: transparent !important; }
        .review-wrong { border: 2px solid var(--danger) !important; background: transparent !important; }
        .ans-label.review-wrong { background: #fef2f2 !important; }
        .true-answer-highlight { border: 2px solid var(--info) !important; background: var(--primary-light) !important; }
        .true-answer-highlight::after { content: "✓ Đáp án đúng"; position: absolute; right: 8px; top: 2px; font-size: 0.65rem; color: var(--info); font-weight: bold; }

        .btn { padding: 10px 22px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-reload { background: var(--info); color: white; } /* Nút làm lại màu xanh dương */

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); display: none; 
            justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(6px);
        }
        .modal-content {
            background: white; padding: 35px; border-radius: 28px;
            width: 90%; max-width: 400px; text-align: center;
        }

        .score-circle {
            width: 120px; height: 120px; background: #eff6ff; color: var(--primary);
            font-size: 50px; font-weight: 900; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            border: 4px solid #dbeafe;
        }

        @media (max-width: 600px) { .answers-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area"><h2>StudyStation</h2></div>
        <div id="action-button-container">
            <button class="btn btn-primary" onclick="openModal('confirmModal')"><span>📤</span> Nộp bài</button>
        </div>
    </header>
    <div id="quiz-container">Đang tải câu hỏi...</div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Xác nhận nộp bài?</h3>
        <p>Bạn có chắc chắn muốn kết thúc bài thi này?</p>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn" style="flex:1; background:#f1f5f9;" onclick="closeModal('confirmModal')">Quay lại</button>
            <button class="btn btn-primary" style="flex:1" onclick="handleFinalSubmit()">Nộp ngay</button>
        </div>
    </div>
</div>

<div id="resultModal" class="modal-overlay">
    <div class="modal-content">
        <div class="score-circle" id="scoreValue">0</div>
        <h3>Kết quả</h3>
        <p id="statsText">Đúng 0/0 câu</p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
            <button class="btn btn-primary" style="justify-content: center;" onclick="reviewMode()">👁️ Xem bài làm</button>
            <button class="btn" style="justify-content: center; background: #f1f5f9" onclick="location.reload()">🔄 Làm lại</button>
        </div>
    </div>
</div>

<script>
    const JSON_URL = "questions.json";
    let questionsData = [];

    // 1. Hàm xáo trộn mảng (Dùng để trộn câu hỏi và đáp án)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 2. Tải câu hỏi từ file JSON với cơ chế Anti-cache (luôn load mới)
    async function loadQuestions() {
        try {
            // Thêm timestamp để trình duyệt không load bản cũ trong bộ nhớ đệm
            const timestamp = new Date().getTime();
            const res = await fetch(`${JSON_URL}?v=${timestamp}`);
            
            if (!res.ok) throw new Error("Lỗi tải file JSON");
            const data = await res.json();

            // 3. Logic Xáo trộn: Trộn thứ tự câu hỏi và trộn cả thứ tự đáp án bên trong
            questionsData = shuffle(data).map(q => {
                // Tạo mảng đối tượng đáp án để giữ nguyên vết đáp án đúng sau khi trộn
                const mixedAnswers = q.answers.map((ans, index) => ({
                    text: ans,
                    isCorrect: index === q.correct
                }));
                
                shuffle(mixedAnswers); // Xáo trộn đáp án

                return {
                    question: q.question,
                    answers: mixedAnswers.map(a => a.text),
                    // Tìm lại vị trí mới của đáp án đúng sau khi đã trộn
                    correct: mixedAnswers.findIndex(a => a.isCorrect)
                };
            });

            renderQuiz();
        } catch (e) {
            document.getElementById('quiz-container').innerText = "Không thể tải dữ liệu: " + e.message;
        }
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = questionsData.map((item, i) => `
            <div class="question-card" id="card-${i}">
                <div class="q-header"><span class="q-badge">Câu ${i+1}</span><span>${item.question}</span></div>
                <div class="answers-grid">
                    ${item.answers.map((ans, idx) => `
                        <label class="ans-label" id="label-${i}-${idx}" onclick="selectAnswer(this, ${i})">
                            <input type="radio" name="question-${i}" value="${idx}" style="margin-right:10px">
                            <span>${ans}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function selectAnswer(el, qIdx) {
        if(el.classList.contains('disabled')) return;
        document.querySelectorAll(`input[name="question-${qIdx}"]`).forEach(input => input.parentElement.classList.remove('selected'));
        el.classList.add('selected');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function handleFinalSubmit() {
        closeModal('confirmModal');
        let correctCount = 0;
        questionsData.forEach((item, i) => {
            const selected = document.querySelector(`input[name="question-${i}"]:checked`);
            if(selected && parseInt(selected.value) === item.correct) correctCount++;
        });
        document.getElementById('scoreValue').innerText = correctCount;
        document.getElementById('statsText').innerText = `Đúng ${correctCount}/${questionsData.length} câu`;
        openModal('resultModal');
    }

    function reviewMode() {
        closeModal('resultModal');
        document.getElementById('action-button-container').innerHTML = `
            <button class="btn btn-reload" onclick="location.reload()"><span>🔄</span> Làm lại</button>
        `;

        questionsData.forEach((item, i) => {
            const card = document.getElementById(`card-${i}`);
            const selectedInput = document.querySelector(`input[name="question-${i}"]:checked`);
            const correctIdx = item.correct;

            // Hiển thị đáp án đúng của hệ thống
            document.getElementById(`label-${i}-${correctIdx}`).classList.add('true-answer-highlight');

            if (selectedInput) {
                const userVal = parseInt(selectedInput.value);
                if (userVal === correctIdx) {
                    card.classList.add('review-correct');
                } else {
                    card.classList.add('review-wrong');
                    document.getElementById(`label-${i}-${userVal}`).classList.add('review-wrong');
                }
            } else {
                card.classList.add('review-wrong');
            }
        });

        document.querySelectorAll('.ans-label').forEach(l => l.classList.add('disabled'));
        document.querySelectorAll('input').forEach(i => i.disabled = true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadQuestions();
</script>
</body>
</html>
