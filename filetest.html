<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Luyện đề Hóa</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:auto;padding:20px;}
.question{margin:20px 0;}
button{margin-top:20px;padding:10px 16px;font-size:16px;}
label{cursor:pointer;}
</style>
</head>
<body>

<h2>Luyện đề Hóa</h2>
<div id="quiz"></div>
<button onclick="submitQuiz()">Nộp bài</button>
<h3 id="result"></h3>

<script>
// 🔗 Đường dẫn file JSON
const JSON_URL = "questions.json"; // Thay bằng URL thực tế

let questions = [];

// 🔀 Xáo trộn mảng
function shuffle(array){
  for(let i = array.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// 📥 Load JSON từ URL
async function loadQuestions(){
  try{
    const res = await fetch(JSON_URL);
    if(!res.ok) throw new Error("Không tải được file JSON");
    const data = await res.json();

    // 🔀 Xáo trộn câu hỏi
    questions = shuffle(data).map(q=>{
      const answers = q.answers.map((a,i)=>({
        text: a,
        isCorrect: i===q.correct
      }));
      return { question: q.question, answers: shuffle(answers) };
    });

    renderQuiz();
  }catch(e){
    document.getElementById("quiz").innerText = "Lỗi load JSON: "+e.message;
  }
}

// 🧠 Render quiz
function renderQuiz(){
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  questions.forEach((q,index)=>{
    const div = document.createElement("div");
    div.classList.add("question");

    let html = `<p>${index+1}. ${q.question}</p>`;
    q.answers.forEach((ans,i)=>{
      html+=`
        <label>
          <input type="radio" name="q${index}" value="${i}"> ${ans.text}
        </label><br>
      `;
    });

    div.innerHTML = html;
    quizDiv.appendChild(div);
  });
}

// 📝 Nộp bài
function submitQuiz(){
  let score = 0;
  questions.forEach((q,index)=>{
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if(selected && q.answers[selected.value].isCorrect) score++;
  });

  document.getElementById("result").innerText = `Bạn đúng ${score}/${questions.length} câu`;
}

// ▶️ Start
loadQuestions();

</script>

</body>
</html>
