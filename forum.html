<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum</title>

  <!-- Firebase (Realtime Database) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-box {
      font-size: 14px;
      opacity: 0.9;
    }

    .post-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .post {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .meta {
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
    }

    .reply {
      margin-left: 20px;
      border-left: 2px solid #ddd;
      padding-left: 10px;
      margin-top: 8px;
    }

    .reply-btn {
      font-size: 12px;
      color: #2563eb;
      cursor: pointer;
      margin-top: 5px;
    }

    .replying {
      font-size: 13px;
      color: #ef4444;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>💬 Forum</div>
    <div class="user-box" id="userBox">Chưa đăng nhập</div>
  </div>

  <div class="post-box">
    <div id="replyingTo"></div>
    <textarea id="content" placeholder="Nhập nội dung..."></textarea>
    <button onclick="sendPost()">Đăng</button>
  </div>

  <div id="posts"></div>
</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCoelxKPrcSeiLpYN2WwYPWysHwZjZLd9c",
  authDomain: "onthi12-thpttanhong.firebaseapp.com",
  projectId: "onthi12-thpttanhong",
  storageBucket: "onthi12-thpttanhong.firebasestorage.app",
  messagingSenderId: "922115936320",
  appId: "1:922115936320:web:67b86c06af9149ff584fa5",
  databaseURL: "https://onthi12-thpttanhong-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER STATE ================= */
let currentUser = null;
let replyTo = null;

/* ================= RECEIVE USER FROM PARENT ================= */
window.addEventListener("message", (event) => {
  if (event.data && event.data.type === "USER_INFO") {
    currentUser = event.data.user;

    const userBox = document.getElementById("userBox");
    if (userBox) {
      userBox.innerText = currentUser.name;
    }
  }
});

/* ================= READY SIGNAL ================= */
window.addEventListener("load", () => {
  window.parent.postMessage({ type: "FORUM_READY" }, "*");
});

/* ================= SEND POST ================= */
function sendPost(){
  const text = document.getElementById("content").value.trim();
  if(!text || !currentUser) return;

  const newPost = {
    text,
    user: currentUser.name,
    uid: currentUser.uid || null,
    parentId: replyTo || null,
    time: Date.now()
  };

  db.ref("posts").push(newPost);

  document.getElementById("content").value = "";
  replyTo = null;
  document.getElementById("replyingTo").innerHTML = "";
}

/* ================= RENDER POSTS ================= */
db.ref("posts").on("value", renderPosts);

function renderPosts(snapshot){
  const data = snapshot.val();
  const container = document.getElementById("posts");
  container.innerHTML = "";

  if(!data) return;

  const posts = Object.entries(data).map(([id, val]) => ({id, ...val}));

  const parents = posts.filter(p => !p.parentId);

  parents.forEach(post => {
    const div = createPostElement(post, posts);
    container.appendChild(div);
  });
}

function createPostElement(post, allPosts){
  const div = document.createElement("div");
  div.className = "post";

  div.innerHTML = `
    <div class="meta"><b>${post.user}</b> • ${new Date(post.time).toLocaleString()}</div>
    <div>${post.text}</div>
    <div class="reply-btn" onclick="setReply('${post.id}', '${post.user}')">↳ Trả lời</div>
  `;

  const replies = allPosts.filter(p => p.parentId === post.id);

  replies.forEach(rep => {
    const repDiv = document.createElement("div");
    repDiv.className = "reply";
    repDiv.innerHTML = `
      <div class="meta"><b>${rep.user}</b> • ${new Date(rep.time).toLocaleString()}</div>
      <div>${rep.text}</div>
      <div class="reply-btn" onclick="setReply('${rep.id}', '${rep.user}')">↳ Trả lời</div>
    `;
    div.appendChild(repDiv);
  });

  return div;
}

/* ================= REPLY ================= */
function setReply(id, user){
  replyTo = id;
  document.getElementById("replyingTo").innerHTML =
    `<div class="replying">Đang trả lời: ${user}</div>`;
}
</script>

</body>
</html>
