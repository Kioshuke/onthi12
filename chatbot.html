<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Hubie Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
  --bot-bubble: #ffffff;
  --user-bubble: #2575fc;
  --bg-color: #f0f2f5;
  --text-main: #2d3436;

  --learnhub-blue: #2575fc;

  /* bổ sung */
  --radius: 16px;
  --card-shadow: 0 8px 24px rgba(0,0,0,0.08);
  --soft-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-color);
  color: var(--text-main);
}

/* CONTAINER */
.chat-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

/* HEADER */
.chat-header {
  background: var(--learnhub-blue);
  color: white;
  padding: 15px 20px;
  font-weight: 700;
  font-size: 1.1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-version {
  font-size: 0.8rem;
  opacity: 0.8;
}

/* CHAT BOX */
#chatBox {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: linear-gradient(to bottom, #f8fafc, #eef2f7);
}

/* MESSAGE ROW */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  animation: fadeIn 0.3s ease forwards;
}

.msg-row.user {
  justify-content: flex-end;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* AVATAR */
.avatar {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* BUBBLE */
.bubble-wrapper {
  display: flex;
  flex-direction: column;
  max-width: 75%;
}

.message {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 0.95rem;
  line-height: 1.6;
  word-wrap: break-word;
  box-shadow: var(--soft-shadow);
  transition: transform 0.2s ease;
}

.message:hover {
  transform: translateY(-1px);
}

/* USER */
.user .message {
  background: var(--primary-gradient);
  color: white;
  border-bottom-right-radius: 6px;
}

/* BOT */
.bot .message {
  background: #fff;
  border: 1px solid #e5e7eb;
  color: var(--text-main);
  border-bottom-left-radius: 6px;
}

/* TIME */
.time {
  font-size: 0.7rem;
  color: #a0a0a0;
  margin-top: 5px;
}

.user .time {
  text-align: right;
}

/* INPUT */
.chat-input {
  display: flex;
  padding: 14px;
  background: white;
  border-top: 1px solid #e5e7eb;
  align-items: center;
  gap: 10px;
}

.chat-input input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid #e5e7eb;
  outline: none;
  font-size: 0.95rem;
  background: #f9fafb;
  transition: 0.2s;
}

.chat-input input:focus {
  border-color: #2575fc;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(37,117,252,0.15);
}

/* SEND BUTTON */
.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--primary-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(37,117,252,0.3);
  transition: all 0.2s ease;
}

.send-btn:hover {
  transform: scale(1.08);
}

.send-btn:active {
  transform: scale(0.95);
}

/* SCROLLBAR */
#chatBox::-webkit-scrollbar {
  width: 6px;
}

#chatBox::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}

/* RENDER MARKDOWN */
.message ul,
.message ol {
  padding-left: 20px;
  margin: 5px 0;
}

.message strong {
  font-weight: 700;
}

.message em {
  font-style: italic;
}

.message code {
  background: #f0f0f0;
  padding: 2px 4px;
  border-radius: 4px;
  font-family: monospace;
}

.message p {
  margin: 0;
}

/* WARNING */
.chat-warning {
  text-align: center;
  font-size: 0.72rem;
  color: #9ca3af;
  padding: 6px 10px 12px;
  background: white;
}
.switch {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 22px;
}
.switch input { display: none; }

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 34px;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: .3s;
}
.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: .3s;
}
input:checked + .slider {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
}
input:checked + .slider:before {
  transform: translateX(20px);
}
@keyframes popupShow {
  from {
    opacity: 0;
    transform: scale(0.85) translateY(20px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
#closeWarning:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 18px rgba(37,117,252,0.4);
}

#closeWarning:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">
    <span class="header-title">Hubie AI – Trợ lý LearnHub</span>
    <span class="header-version">v1.0.0</span> </div>
  
  <div id="chatBox"></div>
  <div style="display:flex; align-items:center; gap:8px; padding:8px 16px;">
  <span style="font-size:13px; color:#6b7280;">
    🔎 Sử dụng Google Search
  </span>

  <label class="switch">
    <input type="checkbox" id="toggleSearch">
    <span class="slider"></span>
  </label>
</div>
  <div class="chat-input">
    <input id="input" placeholder="Bạn muốn trao đổi điều gì..." />
    <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
      <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
    </svg>
  </button>
  </div>
  <div class="chat-warning">
  Hubie có thể mắc lỗi. Hãy kiểm tra các thông tin quan trọng!
</div>
</div>

<script>
let chatHistory = [];
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");

// --- PHẦN THÊM MỚI: NHẬN THÔNG TIN TỪ FIREBASE ---
let userName = "Bạn học";
let userAvatar = "https://i.pravatar.cc/100?img=5";
let hasUserInfo = false;

window.addEventListener('message', (event) => {
    try {
        if (!event.data || event.data.type !== 'USER_INFO') return;

        userName = event.data.name || "Bạn học";
        userAvatar = event.data.avatar || userAvatar;
        hasUserInfo = true;

        console.log("✅ Đã nhận user:", userName);

        const greetingText = 
`Xin chào **${userName}**! 👋
Mình là **Hubie** - trợ lý LearnHub.
Bạn cần mình giúp gì hôm nay? 📘`;

        const firstMsg = chatBox.querySelector(".msg-row.bot .message");

        if (firstMsg) {
            firstMsg.innerHTML = marked.parse(greetingText);
        } else {
            addMessage(greetingText, "bot");
        }

    } catch (err) {
        console.warn("Lỗi USER_INFO:", err);
    }
}); 
// -----------------------------------------------

const botAvatar = "chatboiavt.png";

function getTime() {
  const now = new Date();
  return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, type) {
  const row = document.createElement("div");
  row.className = "msg-row " + type;

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  
  // ✅ CẬP NHẬT: Sử dụng biến userAvatar nhận được từ Firebase
  avatar.src = type === "bot" ? botAvatar : userAvatar;

  const wrapper = document.createElement("div");
  wrapper.className = "bubble-wrapper";

  const bubble = document.createElement("div");
  bubble.className = "message";
  
  if (type === "bot") {
    bubble.innerHTML = marked.parse(text);
  } else {
    bubble.innerText = text;
  }

  const time = document.createElement("div");
  time.className = "time";
  time.innerText = getTime();

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);

  if (type === "user") {
    row.appendChild(wrapper);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(wrapper);
  }

  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, "user");

  chatHistory.push({
    role: "user",
    content: question
  });

  input.value = "";
  const useSearch = document.getElementById("toggleSearch").checked;
  const loadingRow = document.createElement("div");
  loadingRow.className = "msg-row bot";
  loadingRow.id = "current-loading";

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = botAvatar;

  const wrapper = document.createElement("div");
  wrapper.className = "bubble-wrapper";

  const bubble = document.createElement("div");
  bubble.className = "message";
  bubble.innerText = "Hubie đang suy nghĩ...";

  const time = document.createElement("div");
  time.className = "time";
  time.innerText = getTime();

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);

  loadingRow.appendChild(avatar);
  loadingRow.appendChild(wrapper);

  chatBox.appendChild(loadingRow);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("https://hubie-api.onrender.com/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question: `
      Bạn là trợ lý học tập THPT,người dùng có thể tương tác, hỏi, nhờ bạn giải đáp hoặc trò chuyện cùng bạn.
      Hãy trả lời CHÍNH XÁC, nếu không chắc thì nói "mình chưa chắc chắn".

      Câu hỏi: ${question}

      Khi người dùng hỏi câu hỏi thì trả lời theo format bên dưới. Lưu ý chỉ sử dụng lúc hỏi câu hỏi còn lúc trò chuyện thì thoải mái:
      - Đáp án:
      - Giải thích:
      - Mức độ chắc chắn (%):
      Còn khi người dùng trò chuyện thể hiện thái độ vui vẻ trò chuyện
      `,
        userName,
        history: chatHistory,
        useSearch: useSearch
      })
    });

    if (!res.ok) {
      throw new Error("API error");
    }

    const data = await res.json();

    const loading = document.getElementById("current-loading");
    if (loading) chatBox.removeChild(loading);
    
    addMessage(data.answer, "bot");

    chatHistory.push({
      role: "bot",
      content: data.answer
    });

  } catch (err) {
    console.error(err);
    const loading = document.getElementById("current-loading");
    if (loading) chatBox.removeChild(loading);
    addMessage("❌ **Lỗi server**: Không thể kết nối tới trợ lý thép của LearnHub.", "bot");
  }
}

input.addEventListener("keypress", function (e) {
  if (e.key === "Enter") sendMessage();
});

window.onload = function () {
  setTimeout(() => {
    if (!hasUserInfo) { // 🔥 CHỈ CHÀO KHI CHƯA CÓ USER
      addMessage(
        `Xin chào! 👋\nMình là **Hubie** - trợ lý LearnHub.`,
        "bot"
      );
    }
  }, 1000);
};
window.addEventListener("DOMContentLoaded", () => {
  const toggle = document.getElementById("toggleSearch");
  const popup = document.getElementById("searchWarning");
  const closeBtn = document.getElementById("closeWarning");

  toggle.addEventListener("change", () => {
    if (toggle.checked) {
      popup.style.display = "flex";
    }
  });

  closeBtn.addEventListener("click", () => {
    popup.style.display = "none";
  });
});
</script>
<div id="searchWarning" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
  z-index:99999;

  align-items:center;
  justify-content:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:18px;
    width:280px;

    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation: popupShow 0.25s ease;
    text-align:center;
  ">

    <div style="font-size:40px;">⚠️</div>

    <h3 style="
      margin:10px 0 5px;
      font-size:20px;
      font-weight:600;
    ">
      Lưu ý
    </h3>

    <p style="
      font-size:15px;
      color:#6b7280;
      line-height:1.5;
    ">
      Tính năng nâng cao <b>Google Search</b> có giới hạn lượt.<br>
      Chỉ bật khi bạn thật sự cần!
    </p>

    <button id="closeWarning" style="
      margin-top:12px;
      width:100%;
      padding:10px;

      border:none;
      border-radius:10px;

      background: linear-gradient(135deg, #2575fc, #6a11cb);
      color:white;
      font-weight:600;

      cursor:pointer;
      transition:0.2s;
    ">
      OK, hiểu rồi
    </button>

  </div>
</div>
</body>
</html>
